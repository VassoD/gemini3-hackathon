<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen-Sonic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7c6dfa;
      --accent2: #f0a040;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #6be0a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    header { text-align: center; margin-bottom: 40px; }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #drop-zone.drag-over { border-color: var(--accent); background: rgba(124,109,250,0.06); }
    #drop-zone.has-file  { border-color: var(--accent2); background: rgba(240,160,64,0.06); }

    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .drop-label { font-size: 1rem; color: var(--muted); }
    .drop-label strong { color: var(--text); }
    #file-name { margin-top: 8px; font-size: 0.85rem; color: var(--accent2); min-height: 20px; }

    /* Camera */
    #camera-preview {
      width: 100%;
      border-radius: 12px;
      background: #000;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .camera-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    #record-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid var(--accent2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      position: relative;
    }

    #record-btn:active { transform: scale(0.95); }

    #record-btn .dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent2);
      transition: border-radius 0.2s, width 0.2s, height 0.2s;
    }

    #record-btn.recording .dot {
      border-radius: 4px;
      width: 20px;
      height: 20px;
      background: #fa5050;
    }

    #record-btn.recording { border-color: #fa5050; }

    #countdown {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent2);
      min-width: 40px;
      text-align: center;
    }

    #record-timer {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fa5050;
      min-width: 48px;
      text-align: center;
    }

    #camera-status { color: var(--muted); font-size: 0.85rem; text-align: center; margin-top: 8px; }

    /* Primary button */
    .primary-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #5a4de0);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .primary-btn:hover:not(:disabled) { opacity: 0.9; }
    .primary-btn:active:not(:disabled) { transform: scale(0.98); }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Status steps */
    #status-section { display: none; }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      color: var(--muted);
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .step.active { color: var(--text); }
    .step.done   { color: var(--green); }

    .step-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .step.active .step-icon { border-color: var(--accent); color: var(--accent); animation: pulse 1.2s infinite; }
    .step.done   .step-icon { background: var(--green); border-color: var(--green); color: #0a0a0f; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,109,250,0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(124,109,250,0); }
    }

    /* Prompt */
    #prompt-section {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: rgba(124,109,250,0.08);
      border: 1px solid rgba(124,109,250,0.2);
      border-radius: 10px;
      animation: fadeIn 0.4s ease;
    }

    #prompt-section h3 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    #prompt-text { font-size: 0.88rem; line-height: 1.6; }

    /* Audio */
    #audio-section {
      display: none;
      margin-top: 20px;
      animation: fadeIn 0.4s ease;
    }

    #audio-section h3 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent2);
      margin-bottom: 12px;
    }

    #audio-player { width: 100%; border-radius: 8px; accent-color: var(--accent2); }
    #download-link { display: inline-block; margin-top: 10px; font-size: 0.85rem; color: var(--accent2); text-decoration: none; }
    #download-link:hover { text-decoration: underline; }

    /* Error */
    #error-box {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: rgba(250,80,80,0.1);
      border: 1px solid rgba(250,80,80,0.3);
      border-radius: 10px;
      color: #fa8080;
      font-size: 0.88rem;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <header>
    <h1>Lumen-Sonic</h1>
    <p>Point light at your camera. Get music back.</p>
  </header>

  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="upload">📁 Upload Video</button>
      <button class="tab" data-tab="camera">📷 Live Camera</button>
    </div>

    <!-- Upload panel -->
    <div class="panel active" id="panel-upload">
      <div id="drop-zone">
        <input type="file" id="file-input" accept="video/*" />
        <div class="drop-icon">🎬</div>
        <div class="drop-label"><strong>Drop your video here</strong><br>or click to browse</div>
        <div id="file-name"></div>
      </div>
      <button class="primary-btn" id="upload-btn" disabled>Generate Track</button>
    </div>

    <!-- Camera panel -->
    <div class="panel" id="panel-camera">
      <video id="camera-preview" autoplay muted playsinline></video>
      <video id="clip-preview" controls playsinline style="display:none;width:100%;border-radius:12px;margin-top:12px;"></video>
      <div class="camera-controls">
        <button id="record-btn" disabled title="Tap to record">
          <div class="dot"></div>
        </button>
        <span id="countdown"></span>
        <span id="record-timer"></span>
      </div>
      <p id="camera-status">Starting camera…</p>
    </div>

    <div id="error-box"></div>

    <!-- Status -->
    <div id="status-section">
      <hr class="divider" />
      <div class="step" id="step-upload"><div class="step-icon">1</div><span>Uploading &amp; processing video</span></div>
      <div class="step" id="step-analyze"><div class="step-icon">2</div><span>Analyzing light — Gemini Vision</span></div>
      <div class="step" id="step-generate"><div class="step-icon">3</div><span>Generating 30s track — Lyria</span></div>
    </div>

    <div id="prompt-section">
      <h3>Music Prompt</h3>
      <p id="prompt-text"></p>
    </div>

    <div id="audio-section">
      <h3>Your Track</h3>
      <audio id="audio-player" controls></audio><br />
      <a id="download-link" download>⬇ Download WAV</a>
    </div>
  </div>

  <script>
    // ── Tab switching ──────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        resetResults();
      });
    });

    // ── UI helpers ─────────────────────────────────────────────────────────────
    const statusSec  = document.getElementById('status-section');
    const promptSec  = document.getElementById('prompt-section');
    const promptText = document.getElementById('prompt-text');
    const audioSec   = document.getElementById('audio-section');
    const audioPlayer= document.getElementById('audio-player');
    const dlLink     = document.getElementById('download-link');
    const errorBox   = document.getElementById('error-box');

    function resetResults() {
      statusSec.style.display = 'none';
      promptSec.style.display = 'none';
      audioSec.style.display  = 'none';
      errorBox.style.display  = 'none';
      ['step-upload','step-analyze','step-generate'].forEach((id, i) => {
        const el = document.getElementById(id);
        el.classList.remove('active', 'done');
        el.querySelector('.step-icon').textContent = i + 1;
      });
    }

    function setStep(id, state) {
      const el = document.getElementById(id);
      el.classList.remove('active', 'done');
      if (state) el.classList.add(state);
      if (state === 'done') el.querySelector('.step-icon').textContent = '✓';
    }

    function showError(msg) {
      errorBox.textContent = '⚠ ' + msg;
      errorBox.style.display = 'block';
    }

    // ── Two-step pipeline ──────────────────────────────────────────────────────
    async function runPipeline(videoBlob, mimeType) {
      resetResults();
      statusSec.style.display = 'block';

      // Step 1: analyze
      setStep('step-upload', 'active');
      const form = new FormData();
      form.append('video', videoBlob, mimeType === 'video/mp4' ? 'clip.mp4' : 'clip.webm');

      let prompt;
      try {
        const analyzeRes = await fetch('/analyze', { method: 'POST', body: form });
        setStep('step-upload', 'done');
        setStep('step-analyze', 'active');

        const analyzeData = await analyzeRes.json();
        if (!analyzeRes.ok) throw new Error(analyzeData.error || analyzeRes.statusText);
        prompt = analyzeData.prompt;

        setStep('step-analyze', 'done');

        // Show prompt immediately while music generates
        promptText.textContent = prompt;
        promptSec.style.display = 'block';

      } catch (err) {
        showError(err.message);
        return;
      }

      // Step 2: generate
      setStep('step-generate', 'active');
      try {
        const genRes = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        if (!genRes.ok) {
          const d = await genRes.json().catch(() => ({}));
          throw new Error(d.error || genRes.statusText);
        }

        setStep('step-generate', 'done');

        const outFile = genRes.headers.get('X-Output-File') || 'track.wav';
        const blob = await genRes.blob();
        const url  = URL.createObjectURL(blob);

        audioPlayer.src = url;
        dlLink.href = url;
        dlLink.download = outFile;
        audioSec.style.display = 'block';
        audioPlayer.play();

      } catch (err) {
        showError(err.message);
      }
    }

    // ── Upload tab ─────────────────────────────────────────────────────────────
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileNameEl= document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    let selectedFile = null;

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(f) {
      selectedFile = f;
      fileNameEl.textContent = f.name;
      dropZone.classList.add('has-file');
      uploadBtn.disabled = false;
    }

    uploadBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      uploadBtn.disabled = true;
      const mime = selectedFile.type || 'video/mp4';
      runPipeline(selectedFile, mime).finally(() => { uploadBtn.disabled = false; });
    });

    // ── Camera tab ─────────────────────────────────────────────────────────────
    const cameraPreview = document.getElementById('camera-preview');
    const clipPreview   = document.getElementById('clip-preview');
    const recordBtn     = document.getElementById('record-btn');
    const recordTimer   = document.getElementById('record-timer');
    const cameraStatus  = document.getElementById('camera-status');

    let mediaStream = null;
    let mediaRecorder = null;
    let timerInterval = null;

    async function startCamera() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        cameraPreview.srcObject = mediaStream;
        recordBtn.disabled = false;
        cameraStatus.textContent = 'Point at a light source — tap to record, tap again to stop';
      } catch (err) {
        cameraStatus.textContent = 'Camera not available: ' + err.message;
      }
    }

    document.querySelector('[data-tab="camera"]').addEventListener('click', () => {
      if (!mediaStream) startCamera();
    });

    recordBtn.addEventListener('click', () => {
      // Stop recording if in progress
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        clearInterval(timerInterval);
        mediaRecorder.stop();
        return;
      }

      const chunks = [];
      const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
      mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        // Stop camera stream
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        recordBtn.classList.remove('recording');
        recordBtn.disabled = true;
        recordTimer.textContent = '';

        // Show clip playback
        const blob = new Blob(chunks, { type: mimeType });
        clipPreview.src = URL.createObjectURL(blob);
        clipPreview.style.display = 'block';
        cameraPreview.style.display = 'none';
        cameraStatus.textContent = 'Processing…';

        runPipeline(blob, mimeType).then(() => {
          // Hide clip, restart camera for next recording
          clipPreview.style.display = 'none';
          cameraPreview.style.display = 'block';
          startCamera();
        });
      };

      // Start live timer
      let elapsed = 0;
      recordTimer.textContent = '0s';
      timerInterval = setInterval(() => {
        elapsed++;
        recordTimer.textContent = elapsed + 's';
      }, 1000);

      recordBtn.classList.add('recording');
      cameraStatus.textContent = 'Recording… tap to stop';
      mediaRecorder.start();
    });
  </script>
</body>
</html>
